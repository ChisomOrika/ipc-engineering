name: Run Data Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ipc_gosource scheduler
        run: |
          cd ipc_gosource
          python3 scheduler.py

      - name: Run ipc_dash scheduler
        run: |
          cd ipc_dash
          python3 scheduler.py