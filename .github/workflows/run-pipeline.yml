name: IPC Incremental Ingestion

on:
  schedule:
    - cron: '30 4 * * *'   # 05:30 WAT → finishes ~05:50 WAT → data ready before 8am
    - cron: '30 10 * * *'  # 11:30 WAT → midday refresh
    - cron: '30 16 * * *'  # 17:30 WAT → finishes ~17:50 WAT → data ready before 7pm
    - cron: '30 22 * * *'  # 23:30 WAT → overnight refresh
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # Kill if something hangs

    env:
      PG_HOST:             ${{ secrets.PG_HOST }}
      PG_PORT:             ${{ secrets.PG_PORT }}
      PG_USER:             ${{ secrets.PG_USER }}
      PG_PASSWORD:         ${{ secrets.PG_PASSWORD }}
      9JAPAY_SECRET:       ${{ secrets.NINEPAY_SECRET }}
      9JAPAY_API_KEY:      ${{ secrets.NINEPAY_API_KEY }}
      PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
      LENCO_API_TOKEN:     ${{ secrets.LENCO_API_TOKEN }}
      DASH_URL:            ${{ secrets.DASH_URL }}
      GOSOURCE_URL:        ${{ secrets.GOSOURCE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary pymongo pandas python-dotenv requests urllib3 dbt-postgres

      - name: DAASH ingestion
        run: python ipc_ingestion/dash_incremental_load.py

      - name: GoSource ingestion
        run: python ipc_ingestion/gosource_incremental_load.py

      - name: Lenco ingestion
        run: python ipc_ingestion/lenco_incremental_load.py

      - name: Paystack ingestion
        run: python ipc_ingestion/paystack_incremental_load.py

      - name: 9japay ingestion
        run: python ipc_ingestion/9japay_incremental_load.py

      - name: Run dbt transformations
        run: |
          cd ipc_transform
          dbt run --profiles-dir .

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":red_circle: *IPC Ingestion Failed*\n*Run:* ${{ github.run_number }}\n*Triggered:* ${{ github.event_name }}\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
